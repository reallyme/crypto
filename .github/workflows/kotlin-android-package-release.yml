name: Kotlin Android Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.3.3

permissions:
  contents: read

concurrency:
  group: kotlin-android-package-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-release-sha:
    name: Verify reviewed release SHA
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve current release SHA
        id: resolve-release-sha
        run: |
          git fetch --no-tags origin main
          release_sha="$(git rev-parse origin/main)"
          if [ "${GITHUB_SHA}" != "${release_sha}" ]; then
            echo "::error::resolved release SHA does not match the workflow run head SHA"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_SHA=${release_sha}" >> "${GITHUB_ENV}"
          echo "Using release SHA ${release_sha}"

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Require current main and successful Kotlin Android package checks
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.resolve-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: kotlin-android-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
        run: node scripts/verify_release_attestation.mjs

  jvm-native:
    name: JVM native ${{ matrix.platform }}
    needs: verify-release-sha
    runs-on: ${{ matrix.os }}
    outputs:
      linux_x86_64_sha256: ${{ steps.native-digest.outputs.linux_x86_64_sha256 }}
      linux_aarch64_sha256: ${{ steps.native-digest.outputs.linux_aarch64_sha256 }}
      macos_x86_64_sha256: ${{ steps.native-digest.outputs.macos_x86_64_sha256 }}
      macos_aarch64_sha256: ${{ steps.native-digest.outputs.macos_aarch64_sha256 }}
      windows_x86_64_sha256: ${{ steps.native-digest.outputs.windows_x86_64_sha256 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Build native resource
        shell: bash
        run: scripts/build_kotlin_native_resource.sh build/kotlin-native-resources

      - name: Record native library digest outside the artifact
        id: native-digest
        run: node scripts/verify_native_artifact_handoff.mjs record build/kotlin-native-resources "${NATIVE_PLATFORM}"
        shell: bash
        env:
          NATIVE_PLATFORM: ${{ matrix.platform }}

      - name: Write host native integrity metadata
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources/me/really/crypto/native build/kotlin-native-resources/me/really/crypto/native/native-manifest.json
        shell: bash

      - name: Test host native loader
        working-directory: packages/kotlin
        run: ./gradlew --dependency-verification strict test -Preallyme.crypto.nativeResourcesDir=../../build/kotlin-native-resources
        shell: bash

      - name: Upload native resource
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-native-${{ matrix.platform }}
          path: |
            build/kotlin-native-resources
            !build/kotlin-native-resources/me/really/crypto/native/native-manifest.json
          if-no-files-found: error

  maven-package:
    name: Maven package with bundled JNI
    needs: [verify-release-sha, jvm-native]
    runs-on: ubuntu-latest
    environment: maven-release
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Download native resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kotlin-native-*
          path: build/kotlin-native-resources
          merge-multiple: true

      - name: Verify native resources against producer job outputs
        run: node scripts/verify_native_artifact_handoff.mjs verify build/kotlin-native-resources
        env:
          NATIVE_SHA256_LINUX_X86_64: ${{ needs.jvm-native.outputs.linux_x86_64_sha256 }}
          NATIVE_SHA256_LINUX_AARCH64: ${{ needs.jvm-native.outputs.linux_aarch64_sha256 }}
          NATIVE_SHA256_MACOS_X86_64: ${{ needs.jvm-native.outputs.macos_x86_64_sha256 }}
          NATIVE_SHA256_MACOS_AARCH64: ${{ needs.jvm-native.outputs.macos_aarch64_sha256 }}
          NATIVE_SHA256_WINDOWS_X86_64: ${{ needs.jvm-native.outputs.windows_x86_64_sha256 }}

      - name: Write native checksum manifest
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources/me/really/crypto/native build/kotlin-native-resources/me/really/crypto/native/native-manifest.json

      - name: Test and package Maven artifact
        working-directory: packages/kotlin
        run: ./gradlew --dependency-verification strict test publishToMavenLocal -Preallyme.crypto.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources -Preallyme.crypto.requireFullNativeResources=true

      - name: Check Maven remote publishing configuration
        id: maven_remote
        run: |
          if [ -n "${REALLYME_MAVEN_REPOSITORY_URL}" ] && [ -n "${REALLYME_MAVEN_USERNAME}" ] && [ -n "${REALLYME_MAVEN_PASSWORD}" ] && [ -n "${MAVEN_SIGNING_KEY}" ] && [ -n "${MAVEN_SIGNING_PASSWORD}" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::remote Maven publishing credentials are incomplete"
            exit 1
          fi
        env:
          REALLYME_MAVEN_REPOSITORY_URL: ${{ secrets.REALLYME_MAVEN_REPOSITORY_URL }}
          REALLYME_MAVEN_USERNAME: ${{ secrets.REALLYME_MAVEN_USERNAME }}
          REALLYME_MAVEN_PASSWORD: ${{ secrets.REALLYME_MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}

      - name: Publish Maven artifact
        working-directory: packages/kotlin
        run: |
          node ../../scripts/verify_release_attestation.mjs
          ./gradlew --dependency-verification strict publish -Preallyme.crypto.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources -Preallyme.crypto.requireFullNativeResources=true -Preallyme.maven.requireRemote=true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: kotlin-android-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
          REALLYME_MAVEN_REPOSITORY_URL: ${{ secrets.REALLYME_MAVEN_REPOSITORY_URL }}
          REALLYME_MAVEN_USERNAME: ${{ secrets.REALLYME_MAVEN_USERNAME }}
          REALLYME_MAVEN_PASSWORD: ${{ secrets.REALLYME_MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}

  android-aar:
    name: Android AAR with bundled JNI
    needs: verify-release-sha
    runs-on: ubuntu-latest
    environment: maven-release
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Android NDK
        run: |
          { yes 2>/dev/null || true; } | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-crypto/native-manifest.json

      - name: Build Android AAR
        run: packages/kotlin-android/gradlew --dependency-verification strict -p packages/kotlin-android verifyAndroidJniLibs bundleReleaseAar verifyReleaseAarContainsJniLibs -Preallyme.crypto.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.crypto.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.crypto.requireAndroidJniLibs=true

      - name: Check Maven remote publishing configuration
        id: maven_remote
        run: |
          if [ -n "${REALLYME_MAVEN_REPOSITORY_URL}" ] && [ -n "${REALLYME_MAVEN_USERNAME}" ] && [ -n "${REALLYME_MAVEN_PASSWORD}" ] && [ -n "${MAVEN_SIGNING_KEY}" ] && [ -n "${MAVEN_SIGNING_PASSWORD}" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::remote Maven publishing credentials are incomplete"
            exit 1
          fi
        env:
          REALLYME_MAVEN_REPOSITORY_URL: ${{ secrets.REALLYME_MAVEN_REPOSITORY_URL }}
          REALLYME_MAVEN_USERNAME: ${{ secrets.REALLYME_MAVEN_USERNAME }}
          REALLYME_MAVEN_PASSWORD: ${{ secrets.REALLYME_MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}

      - name: Publish Android AAR
        run: |
          node scripts/verify_release_attestation.mjs
          packages/kotlin-android/gradlew --dependency-verification strict -p packages/kotlin-android publish -Preallyme.crypto.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.crypto.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.crypto.requireAndroidJniLibs=true -Preallyme.maven.requireRemote=true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: kotlin-android-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
          REALLYME_MAVEN_REPOSITORY_URL: ${{ secrets.REALLYME_MAVEN_REPOSITORY_URL }}
          REALLYME_MAVEN_USERNAME: ${{ secrets.REALLYME_MAVEN_USERNAME }}
          REALLYME_MAVEN_PASSWORD: ${{ secrets.REALLYME_MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
