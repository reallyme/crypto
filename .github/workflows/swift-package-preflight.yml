name: Swift Package Preflight

run-name: Swift package preflight ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Optional exact main commit SHA to certify. Leave blank to use current origin/main.
        required: false
        type: string
        default: ""
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.3.2

permissions:
  contents: read

concurrency:
  group: swift-package-preflight-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-source-sha:
    name: verify source SHA
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release SHA
        id: resolve-release-sha
        env:
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          git fetch --no-tags origin main
          if [ -n "${RELEASE_SHA_INPUT}" ]; then
            if [[ ! "${RELEASE_SHA_INPUT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::release_sha must be blank or a lowercase 40-character commit SHA"
              exit 1
            fi
            release_sha="${RELEASE_SHA_INPUT}"
          else
            release_sha="$(git rev-parse origin/main)"
          fi
          if [ "$(git rev-parse origin/main)" != "${release_sha}" ]; then
            echo "::error::resolved release SHA is not the current origin/main tip"
            exit 1
          fi
          if [ "${GITHUB_SHA}" != "${release_sha}" ]; then
            echo "::error::resolved release SHA does not match the workflow run head SHA"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

  swift-package:
    name: swift package preflight
    needs: verify-source-sha
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Select Xcode 26.6
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          swift --version

      - name: Build crypto FFI dylib
        run: cargo build --locked -p crypto-ffi

      - name: Enable source-tree Swift runtime FFI
        run: touch .reallyme-crypto-runtime-ffi

      - name: Test Swift package through runtime FFI
        run: swift test
        env:
          REALLYME_CRYPTO_FFI_LIBRARY_PATH: ${{ github.workspace }}/target/debug/libcrypto_ffi.dylib
          REALLYME_CRYPTO_SWIFTPM_RUNTIME_FFI: "1"

      - name: Build SwiftPM binary artifact
        run: scripts/build_swift_xcframework.sh

      # Preserve the exact tested candidate so the credentialed release job
      # promotes these bytes rather than compiling a second archive.
      - name: Upload Swift release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swift-xcframework-${{ inputs.version }}-${{ needs.verify-source-sha.outputs.release_sha }}
          path: |
            build/swift/ReallyMeCryptoFFI.xcframework.zip
            build/swift/ReallyMeCryptoFFI.xcframework.checksum
          if-no-files-found: error
          retention-days: 7

      - name: Test Swift release artifact verifier
        run: node --test scripts/verify_swift_release_artifact.test.mjs

      - name: Bind manifest to Swift release candidate
        run: |
          checksum="$(cat build/swift/ReallyMeCryptoFFI.xcframework.checksum)"
          node scripts/prepare_swift_binary_manifest.mjs "${RELEASE_VERSION}" "${checksum}"
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Verify generated SwiftPM manifest and release candidate
        run: |
          node scripts/verify_swift_release_artifact.mjs build/swift/ReallyMeCryptoFFI.xcframework.zip build/swift/ReallyMeCryptoFFI.xcframework.checksum Package.swift "${RELEASE_VERSION}"
          node scripts/run_pinned_release_readiness.mjs --release-packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Prepare local SwiftPM binary manifest
        run: |
          checksum="$(cat build/swift/ReallyMeCryptoFFI.xcframework.checksum)"
          node scripts/prepare_swift_binary_manifest.mjs "${RELEASE_VERSION}" "${checksum}" --local-artifact-path build/swift/ReallyMeCryptoFFI.xcframework
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Reset SwiftPM package state
        run: |
          rm .reallyme-crypto-runtime-ffi
          swift package reset

      - name: Test Swift package with linked binary target
        run: swift test
