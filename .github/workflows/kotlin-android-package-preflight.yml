name: Kotlin Android Package Preflight

run-name: Kotlin Android package preflight ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Optional exact main commit SHA to certify. Leave blank to use current origin/main.
        required: false
        type: string
        default: ""
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.3.1

permissions:
  contents: read

concurrency:
  group: kotlin-android-package-preflight-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-source-sha:
    name: verify source SHA
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release SHA
        id: resolve-release-sha
        env:
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          git fetch --no-tags origin main
          if [ -n "${RELEASE_SHA_INPUT}" ]; then
            if [[ ! "${RELEASE_SHA_INPUT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::release_sha must be blank or a lowercase 40-character commit SHA"
              exit 1
            fi
            release_sha="${RELEASE_SHA_INPUT}"
          else
            release_sha="$(git rev-parse origin/main)"
          fi
          if [ "$(git rev-parse origin/main)" != "${release_sha}" ]; then
            echo "::error::resolved release SHA is not the current origin/main tip"
            exit 1
          fi
          if [ "${GITHUB_SHA}" != "${release_sha}" ]; then
            echo "::error::resolved release SHA does not match the workflow run head SHA"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

  jvm-native:
    name: jvm native preflight ${{ matrix.platform }}
    needs: verify-source-sha
    runs-on: ${{ matrix.os }}
    outputs:
      linux_x86_64_sha256: ${{ steps.native-digest.outputs.linux_x86_64_sha256 }}
      linux_aarch64_sha256: ${{ steps.native-digest.outputs.linux_aarch64_sha256 }}
      macos_x86_64_sha256: ${{ steps.native-digest.outputs.macos_x86_64_sha256 }}
      macos_aarch64_sha256: ${{ steps.native-digest.outputs.macos_aarch64_sha256 }}
      windows_x86_64_sha256: ${{ steps.native-digest.outputs.windows_x86_64_sha256 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Stage crypto JNI resource
        run: scripts/build_kotlin_native_resource.sh build/kotlin-native-resources
        shell: bash

      - name: Record native library digest outside the artifact
        id: native-digest
        run: node scripts/verify_native_artifact_handoff.mjs record build/kotlin-native-resources "${NATIVE_PLATFORM}"
        shell: bash
        env:
          NATIVE_PLATFORM: ${{ matrix.platform }}

      - name: Upload crypto JNI resource
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-native-${{ matrix.platform }}
          path: build/kotlin-native-resources
          if-no-files-found: error

  kotlin-package:
    name: kotlin maven preflight
    needs: [verify-source-sha, jvm-native]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download crypto JNI resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kotlin-native-*
          path: build/kotlin-native-resources
          merge-multiple: true

      - name: Verify native resources against producer job outputs
        run: node scripts/verify_native_artifact_handoff.mjs verify build/kotlin-native-resources
        env:
          NATIVE_SHA256_LINUX_X86_64: ${{ needs.jvm-native.outputs.linux_x86_64_sha256 }}
          NATIVE_SHA256_LINUX_AARCH64: ${{ needs.jvm-native.outputs.linux_aarch64_sha256 }}
          NATIVE_SHA256_MACOS_X86_64: ${{ needs.jvm-native.outputs.macos_x86_64_sha256 }}
          NATIVE_SHA256_MACOS_AARCH64: ${{ needs.jvm-native.outputs.macos_aarch64_sha256 }}
          NATIVE_SHA256_WINDOWS_X86_64: ${{ needs.jvm-native.outputs.windows_x86_64_sha256 }}

      - name: Write native checksum manifest
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources/me/really/crypto/native build/kotlin-native-resources/me/really/crypto/native/native-manifest.json

      - name: Check package versions and release policy
        run: node scripts/run_pinned_release_readiness.mjs --release-packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Test and publish to Maven local
        working-directory: packages/kotlin
        run: ./gradlew --dependency-verification strict test publishToMavenLocal -Preallyme.crypto.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources -Preallyme.crypto.requireFullNativeResources=true

  android-package:
    name: android aar preflight
    needs: verify-source-sha
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Android NDK
        run: |
          { yes 2>/dev/null || true; } | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-crypto/native-manifest.json

      - name: Build Android AAR
        run: packages/kotlin-android/gradlew --dependency-verification strict -p packages/kotlin-android verifyAndroidJniLibs bundleReleaseAar verifyReleaseAarContainsJniLibs publishToMavenLocal -Preallyme.crypto.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.crypto.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.crypto.requireAndroidJniLibs=true

  android-instrumented:
    name: android instrumented preflight api ${{ matrix.api }}
    needs: verify-source-sha
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api: [26, 36]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android SDK packages
        run: |
          { yes 2>/dev/null || true; } | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "platforms;android-${{ matrix.api }}" \
            "emulator" \
            "platform-tools" \
            "ndk;29.0.14206865" \
            "system-images;android-${{ matrix.api }};google_apis;x86_64"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-crypto/native-manifest.json

      - name: Create Android virtual device
        env:
          # Pin the AVD directory because avdmanager and emulator otherwise infer
          # it independently from runner-specific home-directory variables.
          ANDROID_AVD_HOME: ${{ runner.temp }}/reallyme-avd-${{ matrix.api }}
        run: |
          set -euo pipefail
          AVD_NAME="reallyme-api-${{ matrix.api }}"
          mkdir -p "${ANDROID_AVD_HOME}"
          echo "no" | "${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager" create avd \
            --force \
            --name "${AVD_NAME}" \
            --package "system-images;android-${{ matrix.api }};google_apis;x86_64" \
            --device "pixel"
          if ! "${ANDROID_HOME}/emulator/emulator" -list-avds | grep -Fqx "${AVD_NAME}"; then
            echo "::error::avdmanager did not create the expected Android virtual device"
            exit 1
          fi

      - name: Run Android instrumented tests
        env:
          ANDROID_AVD_HOME: ${{ runner.temp }}/reallyme-avd-${{ matrix.api }}
        run: |
          set -euo pipefail
          AVD_NAME="reallyme-api-${{ matrix.api }}"
          ADB="${ANDROID_HOME}/platform-tools/adb"
          EMULATOR_LOG="${RUNNER_TEMP}/reallyme-emulator-${{ matrix.api }}.log"
          DEVICE_WAIT_ATTEMPTS=60
          BOOT_WAIT_ATTEMPTS=60
          WAIT_INTERVAL_SECONDS=5

          "${ANDROID_HOME}/emulator/emulator" \
            -avd "${AVD_NAME}" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -wipe-data >"${EMULATOR_LOG}" 2>&1 &
          EMULATOR_PID=$!

          cleanup_emulator() {
            if kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              kill "${EMULATOR_PID}" 2>/dev/null || :
              wait "${EMULATOR_PID}" 2>/dev/null || :
            fi
          }
          trap cleanup_emulator EXIT

          fail_emulator() {
            echo "::error::$1"
            if [[ -f "${EMULATOR_LOG}" ]]; then
              sed -n '1,240p' "${EMULATOR_LOG}"
            fi
            exit 1
          }

          device_ready=false
          for ((attempt = 1; attempt <= DEVICE_WAIT_ATTEMPTS; attempt += 1)); do
            if ! kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              fail_emulator "Android emulator exited before registering with ADB"
            fi
            if "${ADB}" get-state 2>/dev/null | grep -Fqx "device"; then
              device_ready=true
              break
            fi
            sleep "${WAIT_INTERVAL_SECONDS}"
          done
          if [[ "${device_ready}" != "true" ]]; then
            fail_emulator "Android emulator did not register with ADB within 300 seconds"
          fi

          boot_ready=false
          for ((attempt = 1; attempt <= BOOT_WAIT_ATTEMPTS; attempt += 1)); do
            if ! kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              fail_emulator "Android emulator exited before completing boot"
            fi
            boot_completed=""
            if boot_completed="$("${ADB}" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" && \
              [[ "${boot_completed}" == "1" ]]; then
              boot_ready=true
              break
            fi
            sleep "${WAIT_INTERVAL_SECONDS}"
          done
          if [[ "${boot_ready}" != "true" ]]; then
            fail_emulator "Android emulator did not complete boot within 300 seconds"
          fi

          "${ADB}" shell input keyevent 82 || true
          packages/kotlin-android/gradlew --dependency-verification strict -p packages/kotlin-android connectedDebugAndroidTest \
            -Preallyme.crypto.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs \
            -Preallyme.crypto.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets \
            -Preallyme.crypto.requireAndroidJniLibs=true
