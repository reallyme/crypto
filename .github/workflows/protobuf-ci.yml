name: Protobuf Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/proto/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "crates/proto/**"
      - "gen/**"
      - "packages/ts/src/proto/generated/**"
      - ".github/workflows/protobuf-ci.yml"
      - "scripts/check_release_readiness.mjs"
      - "scripts/run_pinned_release_readiness.mjs"
      - "scripts/release-readiness/core.mjs"
      - "scripts/redact_crypto_proto_debug.mjs"
  push:
    branches:
      - main
    paths:
      - "crates/proto/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "crates/proto/**"
      - "gen/**"
      - "packages/ts/src/proto/generated/**"
      - ".github/workflows/protobuf-ci.yml"
      - "scripts/check_release_readiness.mjs"
      - "scripts/run_pinned_release_readiness.mjs"
      - "scripts/release-readiness/core.mjs"
      - "scripts/redact_crypto_proto_debug.mjs"

permissions:
  contents: read

env:
  BUFFA_VERSION: 0.9.0
  BUF_VERSION: 1.71.0

jobs:
  protobuf:
    name: lint, immutable contracts, generated freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install pinned Buffa generators
        run: |
          cargo install protoc-gen-buffa --version "$BUFFA_VERSION" --locked
          cargo install protoc-gen-buffa-packaging --version "$BUFFA_VERSION" --locked

      # Exact numeric tests and encoded-wire goldens are the immutable selector
      # baseline and run on every protobuf change.
      - name: Check immutable crypto protobuf contracts
        run: |
          cargo test -p reallyme-crypto-proto --all-features
          cargo test -p crypto-conformance-vectors --test vectors_tests --all-features contract_tests::protobuf_algorithm_enum_numbers_are_stable
          cargo test -p crypto-conformance-vectors --test vectors_tests --all-features contract_tests::every_public_algorithm_has_exactly_one_proto_selector

      - name: Checkout release-readiness runner
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: reallyme/release-readiness
          ref: f27973caf9d3a12847cac4032c361f5f553c97e9
          path: .release-readiness

      - name: Check release readiness generated freshness
        run: node .release-readiness/scripts/run-consumer-check.mjs --generated-freshness
