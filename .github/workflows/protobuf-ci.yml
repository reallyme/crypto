name: Protobuf Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/proto/crypto/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "crates/proto/**"
      - "gen/**"
      - "packages/ts/src/proto/generated/**"
      - ".github/workflows/protobuf-ci.yml"
      - "scripts/redact_crypto_proto_debug.mjs"
  push:
    branches:
      - main
    paths:
      - "crates/proto/crypto/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "crates/proto/**"
      - "gen/**"
      - "packages/ts/src/proto/generated/**"
      - ".github/workflows/protobuf-ci.yml"
      - "scripts/redact_crypto_proto_debug.mjs"

permissions:
  contents: read

env:
  BUFFA_VERSION: 0.8.1
  BUF_VERSION: 1.71.0

jobs:
  protobuf:
    name: lint, breaking, generated freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install pinned Buffa generators
        run: |
          cargo install protoc-gen-buffa --version "$BUFFA_VERSION" --locked
          cargo install protoc-gen-buffa-packaging --version "$BUFFA_VERSION" --locked

      - name: Lint protobuf schema
        run: buf lint

      - name: Fetch main for breaking-change comparison
        run: git fetch origin main:refs/remotes/origin/main

      - name: Check protobuf breaking changes
        run: buf breaking --against '.git#branch=origin/main' --exclude-path proto/reallyme/codec/v1/codec.proto

      - name: Regenerate protobuf artifacts
        run: buf generate

      - name: Redact generated byte-bearing protobuf debug and hash output
        run: node scripts/redact_crypto_proto_debug.mjs

      - name: Format generated Rust protobuf artifacts
        run: cargo fmt --package reallyme-crypto-proto

      - name: Check generated artifacts are fresh
        run: git diff --exit-code -- crates/proto/crypto/proto crates/proto/crypto/src/generated packages/ts/src/proto/generated gen
