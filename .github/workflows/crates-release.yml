name: Crates.io Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crates-release-main
  cancel-in-progress: false

jobs:
  verify-release-sha:
    name: Verify reviewed release SHA
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
      release_version: ${{ steps.resolve-release-sha.outputs.release_version }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve current release SHA and version
        id: resolve-release-sha
        run: |
          git fetch --no-tags origin main
          release_sha="$(git rev-parse origin/main)"
          if [ "${GITHUB_SHA}" != "${release_sha}" ]; then
            echo "::error::resolved release SHA does not match the workflow run head SHA"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          release_version="$(sed -n 's/^version = "\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)"$/\1/p' crates/crypto/Cargo.toml | head -n 1)"
          if [ -z "${release_version}" ]; then
            echo "::error::could not derive release version from crates/crypto/Cargo.toml"
            exit 1
          fi
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Require current main and successful crates package checks
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.resolve-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ steps.resolve-release-sha.outputs.release_version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: crates-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
        run: node scripts/verify_release_attestation.mjs

  dry-run:
    name: crates.io publish preflight
    needs: verify-release-sha
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check crates.io publish order
        run: node scripts/publish_crates_in_order.mjs order
        env:
          RELEASE_VERSION: ${{ needs.verify-release-sha.outputs.release_version }}

      - name: Inspect publishable crate tarballs
        run: node scripts/publish_crates_in_order.mjs inspect
        env:
          RELEASE_VERSION: ${{ needs.verify-release-sha.outputs.release_version }}

  publish:
    name: publish crates
    needs: [verify-release-sha, dry-run]
    runs-on: ubuntu-latest
    environment: crates-io-release
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish crates in dependency order
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is required"
            exit 1
          fi
          node scripts/verify_release_attestation.mjs
          node scripts/publish_crates_in_order.mjs publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.verify-release-sha.outputs.release_version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: crates-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
