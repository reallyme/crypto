name: Crates.io Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish crates to crates.io after the dry run succeeds
        required: true
        type: boolean
        default: false
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.2.0

permissions:
  contents: read

jobs:
  dry-run:
    name: crates.io publish preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check release readiness tripwires
        run: node scripts/check_release_readiness.mjs

      - name: Check crates.io publish order
        run: node scripts/publish_crates_in_order.mjs order
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Inspect publishable crate tarballs
        run: node scripts/publish_crates_in_order.mjs inspect
        env:
          RELEASE_VERSION: ${{ inputs.version }}

  publish:
    name: publish crates
    needs: dry-run
    if: inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish crates in dependency order
        run: node scripts/publish_crates_in_order.mjs publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
