name: Code Checks

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "formal/**"
      - "!CONTRACT.md"
      - "!PROVIDER_POLICY.md"
      - "!SECURITY_MEMORY_MODEL.md"
      - "!docs/conformance.md"
      - "!docs/protobuf.md"
      - "!docs/rust-publishing.md"
      - "LICENSE"
      - "NOTICE"
      - ".github/renovate.json"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "formal/**"
      - "!CONTRACT.md"
      - "!PROVIDER_POLICY.md"
      - "!SECURITY_MEMORY_MODEL.md"
      - "!docs/conformance.md"
      - "!docs/protobuf.md"
      - "!docs/rust-publishing.md"
      - "LICENSE"
      - "NOTICE"
      - ".github/renovate.json"

permissions:
  contents: read

jobs:
  rust:
    name: fmt, lint, test, wasm, package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install nextest
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # nextest
        with:
          tool: nextest@0.9.140

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: Install cargo-audit
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # cargo-audit
        with:
          tool: cargo-audit@0.22.2

      - name: Install wasm-pack
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-pack
        with:
          tool: wasm-pack@0.15.0

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-bindgen-cli
        with:
          tool: wasm-bindgen-cli@0.2.126

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            crates/conformance/package-lock.json
            packages/ts/package-lock.json

      - name: Verify locked dependency graph
        run: cargo metadata --locked --format-version 1 --no-deps

      - name: Format
        run: cargo fmt --check

      - name: Check all features
        run: cargo check --locked --workspace --all-features

      - name: Check unwind-capable FFI release profile
        run: cargo check --locked -p crypto-ffi --profile release-ffi

      - name: Verify production FFI release symbol surface
        run: |
          cargo build --locked -p crypto-ffi --profile release-ffi
          if nm -D --defined-only target/release-ffi/libcrypto_ffi.so | rg 'rm_crypto_(ml_kem_(512|768|1024)|x_wing_768)_encapsulate_derand$'; then
            echo "Conformance-only deterministic encapsulation symbols leaked into the production FFI artifact" >&2
            exit 1
          fi

      - name: Check conformance-only FFI release profile
        run: cargo check --locked -p crypto-ffi --profile release-ffi --features test-vectors

      - name: Reject abort-mode FFI release builds
        run: |
          if cargo check --locked -p crypto-ffi --release; then
            echo "crypto-ffi unexpectedly compiled with the abort-mode release profile" >&2
            exit 1
          fi

      - name: Check warnings as errors
        run: RUSTFLAGS=-Dwarnings cargo check --locked --workspace --all-features

      - name: Check umbrella crate tarball
        run: cargo package --locked -p reallyme-crypto --list

      - name: Inspect publishable crate tarballs
        run: node scripts/publish_crates_in_order.mjs inspect

      - name: Check narrow Rust feature surfaces
        run: |
          cargo test --locked -p reallyme-crypto-dispatch --test feature_lane_tests --no-default-features
          cargo test --locked -p reallyme-crypto-dispatch --test feature_lane_tests --no-default-features --features native,x25519,ml-kem-768
          cargo test --locked -p reallyme-crypto-signer --no-default-features
          cargo test --locked -p reallyme-crypto-signer --no-default-features --features native
          cargo test --locked -p reallyme-crypto-signer --no-default-features --features native,ed25519
          cargo check --locked -p reallyme-crypto --no-default-features --features native,messaging-primitives

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo nextest run --locked --workspace --no-default-features --features native

      - name: Test (all features — runs feature-gated tests incl. the proto bridge)
        run: cargo nextest run --locked --workspace --all-features

      - name: Doc build (enforces missing_docs)
        run: cargo doc --locked --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Doctests
        run: cargo test --locked --workspace --all-features --doc

      - name: Install TypeScript package dependencies
        run: npm ci --prefix packages/ts

      - name: Verify vectors against TypeScript-native noble oracles
        run: |
          npm ci --prefix crates/conformance
          npm run --prefix crates/conformance verify:ts-native

      - name: Verify post-quantum vectors against @noble/post-quantum oracle
        run: npm run --prefix crates/conformance verify:noble-pq

      - name: Test TypeScript package
        run: npm --prefix packages/ts test

      - name: Check generated provider matrix
        run: node scripts/generate_provider_matrix.mjs --check

      - name: Checkout release-readiness runner
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: reallyme/release-readiness
          ref: f27973caf9d3a12847cac4032c361f5f553c97e9
          path: .release-readiness

      - name: Release readiness
        run: node .release-readiness/scripts/run-consumer-check.mjs

      - name: Check native lane
        run: cargo check --locked --workspace --no-default-features --features native

      - name: Check wasm32 lane
        run: cargo check --locked --workspace --no-default-features --features wasm --target wasm32-unknown-unknown

      - name: Dependency policy
        run: cargo deny check

      - name: Security advisory audit
        run: cargo audit

  swift:
    name: swift package + vector conformance
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # ReallyMe Codec 0.2.0 requires Swift tools 6.3. Pin the runner's newest
      # stable Xcode so SwiftPM validates that manifest before compiling tests.
      - name: Select Xcode 26.6
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          swift --version

      # The shipped Rust-C-ABI wrapper KATs (ML-KEM/ML-DSA/SLH-DSA/RSA/…) load
      # this dylib at runtime and skip without it. Build it and hand the path
      # to `swift test` so those wrappers are actually exercised against the
      # shared vectors in CI, not silently skipped.
      - name: Build crypto-ffi dylib
        run: cargo build --locked -p crypto-ffi

      - name: Enable source-tree Swift runtime FFI
        run: touch .reallyme-crypto-runtime-ffi

      - name: Test Swift package
        run: swift test
        env:
          REALLYME_CRYPTO_FFI_LIBRARY_PATH: ${{ github.workspace }}/target/debug/libcrypto_ffi.dylib
          REALLYME_CRYPTO_SWIFTPM_RUNTIME_FFI: "1"

      - name: Test Swift vectors
        run: swift test --package-path crates/conformance/platform/swift

  kotlin:
    name: kotlin package + vector conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Build crypto-ffi dylib
        run: cargo build --locked -p crypto-ffi

      - name: Test Kotlin package
        working-directory: packages/kotlin
        run: ./gradlew --dependency-verification strict test
        env:
          REALLYME_CRYPTO_FFI_LIBRARY_PATH: ${{ github.workspace }}/target/debug/libcrypto_ffi.so

      - name: Test Kotlin vectors
        working-directory: crates/conformance/platform/kotlin
        run: ./gradlew --dependency-verification strict test
