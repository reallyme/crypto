name: npm Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.3.0

permissions:
  contents: read

concurrency:
  group: npm-package-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-release-sha:
    name: Verify reviewed release SHA
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve current release SHA
        id: resolve-release-sha
        run: |
          git fetch --no-tags origin main
          release_sha="$(git rev-parse origin/main)"
          if [ "${GITHUB_SHA}" != "${release_sha}" ]; then
            echo "::error::resolved release SHA does not match the workflow run head SHA"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Require current main and successful npm package checks
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.resolve-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: npm-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
        run: node scripts/verify_release_attestation.mjs

  package:
    name: build and verify npm package
    needs: verify-release-sha
    runs-on: ubuntu-latest
    outputs:
      tarball_sha256: ${{ steps.tarball-digest.outputs.tarball_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-pack
        with:
          tool: wasm-pack@0.15.0

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-bindgen-cli
        with:
          tool: wasm-bindgen-cli@0.2.126

      - name: Install TypeScript package dependencies
        run: npm ci
        working-directory: packages/ts

      - name: Check release version matches source tree
        run: node scripts/run_pinned_release_readiness.mjs --release-packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Test TypeScript package and WASM provider
        run: npm test
        working-directory: packages/ts

      - name: Check npm tarball contents and WASM surface
        run: npm run pack:check
        working-directory: packages/ts

      - name: Build immutable npm tarball
        id: tarball-digest
        run: |
          mkdir -p ../../build/npm
          npm pack --ignore-scripts --pack-destination ../../build/npm
          artifact="../../build/npm/reallyme-crypto-${RELEASE_VERSION}.tgz"
          if [ ! -f "${artifact}" ]; then
            echo "::error::npm did not create the expected ${artifact}"
            exit 1
          fi
          cd ../../build/npm
          sha256sum "reallyme-crypto-${RELEASE_VERSION}.tgz" > "reallyme-crypto-${RELEASE_VERSION}.tgz.sha256"
          tarball_sha256="$(sha256sum "reallyme-crypto-${RELEASE_VERSION}.tgz" | cut -d ' ' -f 1)"
          echo "tarball_sha256=${tarball_sha256}" >> "${GITHUB_OUTPUT}"
        working-directory: packages/ts
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Upload npm tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reallyme-crypto-npm-${{ inputs.version }}-${{ needs.verify-release-sha.outputs.release_sha }}
          path: |
            build/npm/reallyme-crypto-${{ inputs.version }}.tgz
            build/npm/reallyme-crypto-${{ inputs.version }}.tgz.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish npm package
    needs: [verify-release-sha, package]
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download verified npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: reallyme-crypto-npm-${{ inputs.version }}-${{ needs.verify-release-sha.outputs.release_sha }}
          path: build/npm

      - name: Publish verified npm tarball with provenance
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN is required"
            exit 1
          fi
          node scripts/verify_release_attestation.mjs
          cd build/npm
          if [[ ! "${EXPECTED_TARBALL_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::package job tarball digest is missing or malformed"
            exit 1
          fi
          actual_tarball_sha256="$(sha256sum "reallyme-crypto-${RELEASE_VERSION}.tgz" | cut -d ' ' -f 1)"
          if [ "${actual_tarball_sha256}" != "${EXPECTED_TARBALL_SHA256}" ]; then
            echo "::error::downloaded npm tarball does not match the package job output"
            exit 1
          fi
          sha256sum --check "reallyme-crypto-${RELEASE_VERSION}.tgz.sha256"
          npm publish "reallyme-crypto-${RELEASE_VERSION}.tgz" --provenance --access public
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: npm-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
          EXPECTED_TARBALL_SHA256: ${{ needs.package.outputs.tarball_sha256 }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
