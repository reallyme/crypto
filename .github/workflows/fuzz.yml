name: Fuzz

on:
  pull_request:
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.toml"
      - "src/proto_process.rs"
      - "proto/**"
      - "crates/proto/crypto/**"
      - "crates/crypto/primitives/p256/**"
      - "crates/crypto/primitives/rsa/**"
      - "crates/envelopes/jwk/**"
      - "crates/envelopes/jwk-multikey/**"
      - "fuzz/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.toml"
      - "src/proto_process.rs"
      - "proto/**"
      - "crates/proto/crypto/**"
      - "crates/crypto/primitives/p256/**"
      - "crates/crypto/primitives/rsa/**"
      - "crates/envelopes/jwk/**"
      - "crates/envelopes/jwk-multikey/**"
      - "fuzz/**"
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: fuzz target build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

  scheduled:
    name: scheduled fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        target:
          - jwk_multikey
          - p256_point
          - proto_process
          - rsa_der
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Run time-boxed fuzz target
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300 -rss_limit_mb=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
