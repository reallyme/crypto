name: Release Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-crates:
    name: rust crate metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Check workspace metadata
        run: cargo metadata --format-version 1 --no-deps

      - name: Check umbrella crate tarballs
        run: cargo package -p reallyme-crypto --list

      - name: Check generated provider matrix
        run: node scripts/generate_provider_matrix.mjs --check

      - name: Check release readiness contract
        run: node scripts/check_release_readiness.mjs

  swift-package:
    name: swift package preflight
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          swift --version

      - name: Build crypto-ffi dylib
        run: cargo build -p crypto-ffi

      - name: Test Swift package
        run: swift test
        env:
          REALLYME_CRYPTO_FFI_LIBRARY_PATH: ${{ github.workspace }}/target/debug/libcrypto_ffi.dylib
          REALLYME_CRYPTO_SWIFTPM_RUNTIME_FFI: "1"

      - name: Build SwiftPM binary artifact
        run: scripts/build_swift_xcframework.sh

      - name: Prepare release SwiftPM binary manifest
        run: |
          checksum="$(cat build/swift/ReallyMeCryptoFFI.xcframework.checksum)"
          node scripts/prepare_swift_binary_manifest.mjs 0.2.0 "${checksum}"
          node scripts/check_release_readiness.mjs --release-packages

      - name: Prepare local SwiftPM binary manifest
        run: |
          checksum="$(cat build/swift/ReallyMeCryptoFFI.xcframework.checksum)"
          node scripts/prepare_swift_binary_manifest.mjs 0.2.0 "${checksum}" --local-artifact-path build/swift/ReallyMeCryptoFFI.xcframework

      - name: Reset SwiftPM package state
        run: swift package reset

      - name: Test Swift package with linked binary target
        run: swift test

  jvm-native:
    name: jvm native preflight ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Stage crypto JNI resource
        run: scripts/build_kotlin_native_resource.sh build/kotlin-native-resources
        shell: bash

      - name: Upload crypto JNI resource
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-native-${{ matrix.platform }}
          path: build/kotlin-native-resources
          if-no-files-found: error

  kotlin-package:
    name: kotlin maven preflight
    needs: jvm-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download crypto JNI resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kotlin-native-*
          path: build/kotlin-native-resources
          merge-multiple: true

      - name: Write native checksum manifest
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources/me/really/crypto/native build/kotlin-native-resources/me/really/crypto/native/native-manifest.json

      - name: Test and publish to Maven local
        working-directory: packages/kotlin
        run: ./gradlew test publishToMavenLocal -Preallyme.crypto.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources -Preallyme.crypto.requireFullNativeResources=true

  android-package:
    name: android aar preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Android NDK
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-crypto/native-manifest.json

      - name: Build Android AAR
        run: packages/kotlin-android/gradlew -p packages/kotlin-android bundleReleaseAar verifyReleaseAarContainsJniLibs -Preallyme.crypto.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.crypto.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.crypto.requireAndroidJniLibs=true

  android-instrumented:
    name: android instrumented preflight api ${{ matrix.api }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api: [26, 36]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android SDK packages
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "platforms;android-${{ matrix.api }}" \
            "emulator" \
            "platform-tools" \
            "ndk;29.0.14206865" \
            "system-images;android-${{ matrix.api }};google_apis;x86_64"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-crypto/native-manifest.json

      - name: Create Android virtual device
        env:
          # Pin the AVD directory because avdmanager and emulator otherwise infer
          # it independently from runner-specific home-directory variables.
          ANDROID_AVD_HOME: ${{ runner.temp }}/reallyme-avd-${{ matrix.api }}
        run: |
          set -euo pipefail
          AVD_NAME="reallyme-api-${{ matrix.api }}"
          mkdir -p "${ANDROID_AVD_HOME}"
          echo "no" | "${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager" create avd \
            --force \
            --name "${AVD_NAME}" \
            --package "system-images;android-${{ matrix.api }};google_apis;x86_64" \
            --device "pixel"
          if ! "${ANDROID_HOME}/emulator/emulator" -list-avds | grep -Fqx "${AVD_NAME}"; then
            echo "::error::avdmanager did not create the expected Android virtual device"
            exit 1
          fi

      - name: Run Android instrumented tests
        env:
          ANDROID_AVD_HOME: ${{ runner.temp }}/reallyme-avd-${{ matrix.api }}
        run: |
          set -euo pipefail
          AVD_NAME="reallyme-api-${{ matrix.api }}"
          ADB="${ANDROID_HOME}/platform-tools/adb"
          EMULATOR_LOG="${RUNNER_TEMP}/reallyme-emulator-${{ matrix.api }}.log"
          DEVICE_WAIT_ATTEMPTS=60
          BOOT_WAIT_ATTEMPTS=60
          WAIT_INTERVAL_SECONDS=5

          "${ANDROID_HOME}/emulator/emulator" \
            -avd "${AVD_NAME}" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -wipe-data >"${EMULATOR_LOG}" 2>&1 &
          EMULATOR_PID=$!

          cleanup_emulator() {
            if kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              kill "${EMULATOR_PID}" 2>/dev/null || :
              wait "${EMULATOR_PID}" 2>/dev/null || :
            fi
          }
          trap cleanup_emulator EXIT

          fail_emulator() {
            echo "::error::$1"
            if [[ -f "${EMULATOR_LOG}" ]]; then
              sed -n '1,240p' "${EMULATOR_LOG}"
            fi
            exit 1
          }

          device_ready=false
          for ((attempt = 1; attempt <= DEVICE_WAIT_ATTEMPTS; attempt += 1)); do
            if ! kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              fail_emulator "Android emulator exited before registering with ADB"
            fi
            if "${ADB}" get-state 2>/dev/null | grep -Fqx "device"; then
              device_ready=true
              break
            fi
            sleep "${WAIT_INTERVAL_SECONDS}"
          done
          if [[ "${device_ready}" != "true" ]]; then
            fail_emulator "Android emulator did not register with ADB within 300 seconds"
          fi

          boot_ready=false
          for ((attempt = 1; attempt <= BOOT_WAIT_ATTEMPTS; attempt += 1)); do
            if ! kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              fail_emulator "Android emulator exited before completing boot"
            fi
            boot_completed=""
            if boot_completed="$("${ADB}" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" && \
              [[ "${boot_completed}" == "1" ]]; then
              boot_ready=true
              break
            fi
            sleep "${WAIT_INTERVAL_SECONDS}"
          done
          if [[ "${boot_ready}" != "true" ]]; then
            fail_emulator "Android emulator did not complete boot within 300 seconds"
          fi

          "${ADB}" shell input keyevent 82 || true
          packages/kotlin-android/gradlew -p packages/kotlin-android connectedDebugAndroidTest \
            -Preallyme.crypto.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs \
            -Preallyme.crypto.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets \
            -Preallyme.crypto.requireAndroidJniLibs=true

  npm-package:
    name: npm package preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-pack
        with:
          tool: wasm-pack@0.15.0

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-bindgen-cli
        with:
          tool: wasm-bindgen-cli@0.2.126

      - name: Install TypeScript package dependencies
        run: npm ci
        working-directory: packages/ts

      - name: Test TypeScript package
        run: npm test
        working-directory: packages/ts

      - name: Check npm tarball contents
        run: npm run pack:check
        working-directory: packages/ts
