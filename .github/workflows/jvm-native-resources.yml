name: JVM Native Resources

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jvm-native:
    name: jvm native resources ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Stage crypto JNI resource
        run: scripts/build_kotlin_native_resource.sh build/kotlin-native-resources
        shell: bash

      - name: Upload crypto JNI resource
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-native-${{ matrix.platform }}
          path: build/kotlin-native-resources
          if-no-files-found: error
