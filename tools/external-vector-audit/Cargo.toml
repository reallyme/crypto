[package]
name = "external-vector-audit"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Manual audit runner for upstream cryptographic conformance vectors."

[features]
default = []
native = [
    "reallyme-crypto-aes-kw/native",
    "reallyme-crypto-aes256-gcm/native",
    "reallyme-crypto-aes256-gcm-siv/native",
    "reallyme-crypto-chacha20-poly1305/native",
    "reallyme-crypto-ed25519/native",
    "reallyme-crypto-hkdf/native",
    "reallyme-crypto-hmac/native",
    "reallyme-crypto-hpke/test-vectors",
    "reallyme-crypto-kmac/native",
    "reallyme-crypto-ml-dsa-44/native",
    "reallyme-crypto-ml-dsa-65/native",
    "reallyme-crypto-ml-dsa-87/native",
    "reallyme-crypto-ml-kem-1024/native",
    "reallyme-crypto-ml-kem-512/native",
    "reallyme-crypto-ml-kem-768/native",
    "reallyme-crypto-p256/native",
    "reallyme-crypto-p384/native",
    "reallyme-crypto-p521/native",
    "reallyme-crypto-pbkdf2/native",
    "reallyme-crypto-rsa/native",
    "reallyme-crypto-secp256k1/native",
    "reallyme-crypto-sha2/native",
    "reallyme-crypto-sha2-256/native",
    "reallyme-crypto-sha3/native",
    "reallyme-crypto-sha3-256/native",
    "reallyme-crypto-slh-dsa/native",
    "reallyme-crypto-x25519/native",
    "reallyme-crypto-x448/native",
    "reallyme-crypto-x-wing/native",
]

[dependencies]
flate2 = "1"
hex = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
shake = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }

reallyme-crypto-aes-kw = { version = "0.3.0", path = "../../crates/aes-kw", default-features = false }
reallyme-crypto-aes256-gcm = { version = "0.3.0", path = "../../crates/aes256-gcm", default-features = false }
reallyme-crypto-aes256-gcm-siv = { version = "0.3.0", path = "../../crates/aes256-gcm-siv", default-features = false }
reallyme-crypto-chacha20-poly1305 = { version = "0.3.0", path = "../../crates/chacha20-poly1305", default-features = false }
reallyme-crypto-core = { version = "0.3.0", path = "../../crates/crypto/core" }
reallyme-crypto-ed25519 = { version = "0.3.0", path = "../../crates/ed25519", default-features = false }
reallyme-crypto-hkdf = { version = "0.3.0", path = "../../crates/hkdf", default-features = false }
reallyme-crypto-hpke = { version = "0.3.0", path = "../../crates/hpke", default-features = false }
reallyme-crypto-hmac = { version = "0.3.0", path = "../../crates/hmac", default-features = false }
reallyme-crypto-kmac = { version = "0.3.0", path = "../../crates/kmac", default-features = false }
reallyme-crypto-ml-dsa-44 = { version = "0.3.0", path = "../../crates/ml-dsa-44", default-features = false }
reallyme-crypto-ml-dsa-65 = { version = "0.3.0", path = "../../crates/ml-dsa-65", default-features = false }
reallyme-crypto-ml-dsa-87 = { version = "0.3.0", path = "../../crates/ml-dsa-87", default-features = false }
reallyme-crypto-ml-kem-1024 = { version = "0.3.0", path = "../../crates/ml-kem-1024", default-features = false }
reallyme-crypto-ml-kem-512 = { version = "0.3.0", path = "../../crates/ml-kem-512", default-features = false }
reallyme-crypto-ml-kem-768 = { version = "0.3.0", path = "../../crates/ml-kem-768", default-features = false }
reallyme-crypto-p256 = { version = "0.3.0", path = "../../crates/p256", default-features = false }
reallyme-crypto-p384 = { version = "0.3.0", path = "../../crates/p384", default-features = false }
reallyme-crypto-p521 = { version = "0.3.0", path = "../../crates/p521", default-features = false }
reallyme-crypto-pbkdf2 = { version = "0.3.0", path = "../../crates/pbkdf2", default-features = false }
reallyme-crypto-rsa = { version = "0.3.0", path = "../../crates/rsa", default-features = false }
reallyme-crypto-secp256k1 = { version = "0.3.0", path = "../../crates/secp256k1", default-features = false }
reallyme-crypto-sha2 = { version = "0.3.0", path = "../../crates/sha2", default-features = false }
reallyme-crypto-sha2-256 = { version = "0.3.0", path = "../../crates/sha2-256", default-features = false }
reallyme-crypto-sha3 = { version = "0.3.0", path = "../../crates/sha3", default-features = false }
reallyme-crypto-sha3-256 = { version = "0.3.0", path = "../../crates/sha3-256", default-features = false }
