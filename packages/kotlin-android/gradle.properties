android.useAndroidX=true
# Dokka and Android lint share a Gradle daemon during release packaging. The
# default metaspace ceiling forces a daemon restart after documentation work.
org.gradle.jvmargs=-Xmx1g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
