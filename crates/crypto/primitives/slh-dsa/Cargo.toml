[package]
name = "reallyme-crypto-slh-dsa"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "SLH-DSA-SHA2-128s signature primitive for ReallyMe Crypto."
readme = "README.md"

[lib]
name = "crypto_slh_dsa"

[features]
default = []
native = [
    "dep:rand",
    "dep:slh-dsa",
]
wasm = [
    "dep:js-sys",
    "dep:wasm-bindgen",
]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../core" }
zeroize = { workspace = true }

rand = { workspace = true, optional = true }
slh-dsa = { workspace = true, features = ["zeroize"], optional = true }

js-sys = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }

[lints]
workspace = true
