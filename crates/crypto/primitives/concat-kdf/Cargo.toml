[package]
name = "reallyme-crypto-concat-kdf"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
publish = true
description = "JWA ECDH-ES Concat KDF primitive for ReallyMe Crypto."
license.workspace = true
repository.workspace = true

[lib]
name = "crypto_concat_kdf"

[features]
default = []
native = []
wasm = []

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.2", path = "../../core" }
sha2 = { workspace = true }
zeroize = { workspace = true, features = ["derive"] }

[lints]
workspace = true
