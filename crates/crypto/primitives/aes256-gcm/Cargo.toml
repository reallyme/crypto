[package]
name = "reallyme-crypto-aes256-gcm"
version = "0.1.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "AES-256-GCM authenticated encryption primitive for ReallyMe Crypto."

[lib]
name = "crypto_aes256_gcm"

[features]
default = []

native = [
    "dep:aes",
    "dep:aes-gcm",
]

# Platform backends
wasm = [
    "dep:wasm-bindgen",
    "dep:js-sys",
]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../../core" }
zeroize = { workspace = true, features = ["zeroize_derive"] }

# Native-only crypto deps
aes = { workspace = true, optional = true }
aes-gcm = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }

[dev-dependencies]
hex = { workspace = true }
wasm-bindgen-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
aes-gcm = { workspace = true }

[lints]
workspace = true
