[package]
name = "reallyme-crypto-x25519"
version = "0.1.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "X25519 key agreement primitive for ReallyMe Crypto."

[lib]
name = "crypto_x25519"

[features]
default = []

# -----------------------------
# Native Rust backend
# -----------------------------
native = [
    "dep:x25519-dalek",
]

# -----------------------------
# Platform backends (NO Rust crypto)
# -----------------------------
wasm = [
    "dep:wasm-bindgen",
    "dep:js-sys",
]


[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../../core" }
zeroize = { workspace = true }

# -----------------------------
# Native-only crypto deps
# -----------------------------
x25519-dalek = { workspace = true, features = ["getrandom", "static_secrets", "zeroize"], optional = true }

# -----------------------------
# WASM-only JS bridge deps
# -----------------------------
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }

[dev-dependencies]
hex = { workspace = true }

[lints]
workspace = true
