[package]
name = "reallyme-crypto-ml-kem-1024"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "ML-KEM-1024 key encapsulation primitive for ReallyMe Crypto."

[lib]
name = "crypto_ml_kem_1024"

[features]
default = [ ]

native = [
    "dep:ml-kem",
]

# Platform backends
wasm = [
    "dep:wasm-bindgen",
    "dep:js-sys",
]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../core" }
zeroize = { workspace = true }

# -----------------------------
# Native-only PQ crypto deps
# -----------------------------
ml-kem = { workspace = true, features = ["getrandom", "zeroize"], optional = true }

# -----------------------------
# WASM-only deps (only if wasm/*.rs uses them)
# -----------------------------
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }

[lints]
workspace = true
