[package]
name = "reallyme-crypto-secp256k1"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "secp256k1 ECDSA and BIP-340 Schnorr primitives for ReallyMe Crypto."

[lib]
name = "crypto_secp256k1"

[features]
default = [ ]

native = [
    "dep:k256",
    "dep:ecdsa",
    "dep:sha2",
]

# Platform backends
wasm = [
    "dep:wasm-bindgen",
    "dep:js-sys",
]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../core" }
zeroize = { workspace = true }

# -----------------------------
# Native-only crypto deps
# -----------------------------
# NOTE: k256 0.14 has no `zeroize` cargo feature; zeroization support is
# unconditional in elliptic-curve 0.14 (SecretKey zeroizes on drop).
k256 = { workspace = true, features = ["ecdsa", "schnorr"], optional = true }
ecdsa = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }

# -----------------------------
# WASM-only deps (if wasm/*.rs needs them)
# -----------------------------
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }

[dev-dependencies]
hex = { workspace = true }
hex-literal = { workspace = true }

[lints]
workspace = true
