[package]
name = "reallyme-crypto-rsa"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "RSA signature verification primitive for ReallyMe Crypto."

[lib]
name = "crypto_rsa"

[features]
default = ["native"]
native = []
wasm = []

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../core" }
sha1 = { workspace = true }
sha2 = { workspace = true }
crypto-bigint = { workspace = true }
const-oid = { workspace = true }
spki = { workspace = true }
subtle = { workspace = true }

[dev-dependencies]
base64 = { workspace = true }

[lints]
workspace = true
