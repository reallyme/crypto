[package]
name = "reallyme-crypto-chacha20-poly1305"
version = "0.1.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "ChaCha20-Poly1305 and XChaCha20-Poly1305 primitives for ReallyMe Crypto."

[package.metadata.cargo-machete]
ignored = [
    # Enables getrandom's wasm entropy backend for the transitive RustCrypto stack.
    "getrandom",
]

[lib]
name = "crypto_chacha20_poly1305"

[features]
default = []
native = ["dep:chacha20poly1305", "dep:getrandom"]
wasm = ["dep:chacha20poly1305", "dep:getrandom"]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../../core" }
zeroize = { workspace = true, features = ["zeroize_derive"] }
chacha20poly1305 = { workspace = true, optional = true, features = ["zeroize"] }
getrandom = { workspace = true, features = ["wasm_js"], optional = true }

[lints]
workspace = true
