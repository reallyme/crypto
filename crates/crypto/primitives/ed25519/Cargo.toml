[package]
name = "reallyme-crypto-ed25519"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "Ed25519 signing primitive for ReallyMe Crypto."

[lib]
name = "crypto_ed25519"

[features]
default = [ ]

native = [
    "dep:ed25519-dalek",
    "dep:rand",
]

# Platform backends
wasm = [
    "dep:wasm-bindgen",
    "dep:js-sys",
]


[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../core" }
zeroize = { workspace = true }

# -----------------------------
# Native-only crypto deps
# -----------------------------
ed25519-dalek = { workspace = true, features = ["rand_core", "zeroize"], optional = true }
rand = { workspace = true, optional = true }

# -----------------------------
# WASM-only deps (only if used in wasm/*.rs)
# -----------------------------
wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }

[dev-dependencies]
hex = { workspace = true }

[lints]
workspace = true
