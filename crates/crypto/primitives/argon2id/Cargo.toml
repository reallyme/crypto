[package]
name = "reallyme-crypto-argon2id"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
publish = true
description = "Argon2id password hashing and key derivation primitive for ReallyMe Crypto."
license.workspace = true
repository.workspace = true

[package.metadata.cargo-machete]
ignored = [
    # Enables getrandom's wasm entropy backend for the transitive password-hash stack.
    "getrandom",
]

[lib]
name = "crypto_argon2id"

[features]
default = ["native"]
native = []
wasm = ["dep:getrandom"]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../../core" }
argon2 = { workspace = true, features = ["alloc"] }
getrandom = { workspace = true, features = ["wasm_js"], optional = true }
zeroize = { workspace = true, features = ["derive"] }

[dev-dependencies]
hex = { workspace = true }

[lints]
workspace = true
