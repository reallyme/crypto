[package]
name = "reallyme-crypto-hkdf"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
publish = true
description = "HKDF key derivation primitive for ReallyMe Crypto."
license.workspace = true
repository.workspace = true

[package.metadata.cargo-machete]
ignored = [
    # Enables getrandom's wasm entropy backend for the transitive digest stack.
    "getrandom",
]

[lib]
name = "crypto_hkdf"

[features]
default = []
native = []
wasm = ["dep:getrandom"]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../../core" }
getrandom = { workspace = true, features = ["wasm_js"], optional = true }
hkdf = { workspace = true }
sha2 = { workspace = true }
sha3 = { workspace = true }
zeroize = { workspace = true, features = ["derive"] }

[lints]
workspace = true
