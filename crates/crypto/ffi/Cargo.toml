[package]
name = "crypto-ffi"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "ReallyMe native C ABI surface for audited cryptographic primitives."

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[dependencies]
crypto-aes-kw = { package = "reallyme-crypto-aes-kw", version = "0.2.0", path = "../primitives/aes-kw", default-features = false, features = ["native"] }
crypto-aes256-gcm = { package = "reallyme-crypto-aes256-gcm", version = "0.2.0", path = "../primitives/aes256-gcm", default-features = false, features = ["native"] }
crypto-aes256-gcm-siv = { package = "reallyme-crypto-aes256-gcm-siv", version = "0.2.0", path = "../primitives/aes256-gcm-siv", default-features = false, features = ["native"] }
crypto-argon2id = { package = "reallyme-crypto-argon2id", version = "0.2.0", path = "../primitives/argon2id", default-features = false, features = ["native"] }
crypto-chacha20-poly1305 = { package = "reallyme-crypto-chacha20-poly1305", version = "0.2.0", path = "../primitives/chacha20-poly1305", default-features = false, features = ["native"] }
crypto-constant-time = { package = "reallyme-crypto-constant-time", version = "0.2.0", path = "../primitives/constant-time", default-features = false, features = ["native"] }
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../core" }
crypto-csprng = { package = "reallyme-crypto-csprng", version = "0.2.0", path = "../primitives/csprng", default-features = false, features = ["native"] }
crypto-ed25519 = { package = "reallyme-crypto-ed25519", version = "0.2.0", path = "../primitives/ed25519", default-features = false, features = ["native"] }
crypto-hmac = { package = "reallyme-crypto-hmac", version = "0.2.0", path = "../primitives/hmac", default-features = false, features = ["native"] }
crypto-hkdf = { package = "reallyme-crypto-hkdf", version = "0.2.0", path = "../primitives/hkdf", default-features = false, features = ["native", "sha3"] }
crypto-hpke = { package = "reallyme-crypto-hpke", version = "0.2.0", path = "../protocols/hpke", default-features = false, features = ["native"] }
crypto-ml-dsa-44 = { package = "reallyme-crypto-ml-dsa-44", version = "0.2.0", path = "../primitives/ml-dsa-44", default-features = false, features = ["native"] }
crypto-ml-dsa-65 = { package = "reallyme-crypto-ml-dsa-65", version = "0.2.0", path = "../primitives/ml-dsa-65", default-features = false, features = ["native"] }
crypto-ml-dsa-87 = { package = "reallyme-crypto-ml-dsa-87", version = "0.2.0", path = "../primitives/ml-dsa-87", default-features = false, features = ["native"] }
crypto-ml-kem-512 = { package = "reallyme-crypto-ml-kem-512", version = "0.2.0", path = "../primitives/ml-kem-512", default-features = false, features = ["native"] }
crypto-ml-kem-1024 = { package = "reallyme-crypto-ml-kem-1024", version = "0.2.0", path = "../primitives/ml-kem-1024", default-features = false, features = ["native"] }
crypto-ml-kem-768 = { package = "reallyme-crypto-ml-kem-768", version = "0.2.0", path = "../primitives/ml-kem-768", default-features = false, features = ["native"] }
crypto-p256 = { package = "reallyme-crypto-p256", version = "0.2.0", path = "../primitives/p256", default-features = false, features = ["native"] }
crypto-p384 = { package = "reallyme-crypto-p384", version = "0.2.0", path = "../primitives/p384", default-features = false, features = ["native"] }
crypto-p521 = { package = "reallyme-crypto-p521", version = "0.2.0", path = "../primitives/p521", default-features = false, features = ["native"] }
crypto-pbkdf2 = { package = "reallyme-crypto-pbkdf2", version = "0.2.0", path = "../primitives/pbkdf2", default-features = false, features = ["native"] }
crypto-proto = { package = "reallyme-crypto-proto", version = "0.2.0", path = "../../proto/crypto", default-features = false, features = ["generated"] }
crypto-rsa = { package = "reallyme-crypto-rsa", version = "0.2.0", path = "../primitives/rsa", default-features = false, features = ["native"] }
crypto-secp256k1 = { package = "reallyme-crypto-secp256k1", version = "0.2.0", path = "../primitives/secp256k1", default-features = false, features = ["native"] }
crypto-sha2 = { package = "reallyme-crypto-sha2", version = "0.2.0", path = "../primitives/sha2" }
crypto-sha2-256 = { package = "reallyme-crypto-sha2-256", version = "0.2.0", path = "../primitives/sha2-256" }
crypto-sha3 = { package = "reallyme-crypto-sha3", version = "0.2.0", path = "../primitives/sha3" }
crypto-sha3-256 = { package = "reallyme-crypto-sha3-256", version = "0.2.0", path = "../primitives/sha3-256" }
crypto-slh-dsa = { package = "reallyme-crypto-slh-dsa", version = "0.2.0", path = "../primitives/slh-dsa", default-features = false, features = ["native"] }
crypto-x25519 = { package = "reallyme-crypto-x25519", version = "0.2.0", path = "../primitives/x25519", default-features = false, features = ["native"] }
crypto-x-wing = { package = "reallyme-crypto-x-wing", version = "0.2.0", path = "../primitives/x-wing", default-features = false, features = ["native"] }
reallyme-crypto = { version = "0.2.0", path = "../../..", default-features = false, features = ["proto-process", "native", "aes", "aes-gcm-siv", "chacha20-poly1305", "ed25519", "hmac", "p256", "p384", "p521", "secp256k1", "x25519", "ml-dsa-44", "ml-dsa-65", "ml-dsa-87", "ml-kem-512", "ml-kem-768", "ml-kem-1024", "sha2", "sha3", "x-wing"] }
jni = "0.22.4"
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
base64 = { workspace = true }
buffa = { workspace = true }
sha2 = { workspace = true }

[lints]
workspace = true
