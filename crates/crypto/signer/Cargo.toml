[package]
name = "reallyme-crypto-signer"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "Signer trait abstraction (HSM/QSCD/remote-sign friendly)."

[lib]
name = "crypto_signer"
crate-type = ["rlib"]

[features]
default = []
native = ["crypto-dispatch/native"]
wasm = ["crypto-dispatch/wasm"]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../core" }
crypto-dispatch = { package = "reallyme-crypto-dispatch", version = "0.1.1", path = "../dispatch", default-features = false }
secrecy = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }

[lints]
workspace = true
