[package]
name = "reallyme-crypto-signer"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "Signer trait abstraction (HSM/QSCD/remote-sign friendly)."

[lib]
name = "crypto_signer"
crate-type = ["rlib"]

[features]
default = []
native = ["crypto-dispatch/native"]
wasm = ["crypto-dispatch/wasm"]
ed25519 = ["crypto-dispatch/ed25519"]
ml-dsa-44 = ["crypto-dispatch/ml-dsa-44"]
ml-dsa-65 = ["crypto-dispatch/ml-dsa-65"]
ml-dsa-87 = ["crypto-dispatch/ml-dsa-87"]
p256 = ["crypto-dispatch/p256"]
p384 = ["crypto-dispatch/p384"]
p521 = ["crypto-dispatch/p521"]
secp256k1 = ["crypto-dispatch/secp256k1"]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../core" }
crypto-dispatch = { package = "reallyme-crypto-dispatch", version = "0.2.0", path = "../dispatch", default-features = false }
secrecy = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }

[lints]
workspace = true
