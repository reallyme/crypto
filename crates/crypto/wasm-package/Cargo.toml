[package]
name = "reallyme-crypto-wasm"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
publish = false
license.workspace = true
repository.workspace = true
description = "WASM bindings for the ReallyMe TypeScript crypto package."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
crypto-aes-kw = { package = "reallyme-crypto-aes-kw", version = "0.1.1", path = "../primitives/aes-kw", default-features = false, features = ["wasm"] }
crypto-aes256-gcm = { package = "reallyme-crypto-aes256-gcm", version = "0.1.1", path = "../primitives/aes256-gcm", default-features = false, features = ["native"] }
crypto-aes256-gcm-siv = { package = "reallyme-crypto-aes256-gcm-siv", version = "0.1.1", path = "../primitives/aes256-gcm-siv", default-features = false, features = ["wasm"] }
crypto-argon2id = { package = "reallyme-crypto-argon2id", version = "0.1.1", path = "../primitives/argon2id", default-features = false }
crypto-chacha20-poly1305 = { package = "reallyme-crypto-chacha20-poly1305", version = "0.1.1", path = "../primitives/chacha20-poly1305", default-features = false, features = ["wasm"] }
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../core" }
crypto-hpke = { package = "reallyme-crypto-hpke", version = "0.1.1", path = "../protocols/hpke", default-features = false, features = ["wasm", "test-vectors"] }
crypto-ml-dsa-44 = { package = "reallyme-crypto-ml-dsa-44", version = "0.1.1", path = "../primitives/ml-dsa-44", default-features = false, features = ["native"] }
crypto-ml-dsa-65 = { package = "reallyme-crypto-ml-dsa-65", version = "0.1.1", path = "../primitives/ml-dsa-65", default-features = false, features = ["native"] }
crypto-ml-dsa-87 = { package = "reallyme-crypto-ml-dsa-87", version = "0.1.1", path = "../primitives/ml-dsa-87", default-features = false, features = ["native"] }
crypto-ml-kem-1024 = { package = "reallyme-crypto-ml-kem-1024", version = "0.1.2", path = "../primitives/ml-kem-1024", default-features = false, features = ["native"] }
crypto-ml-kem-512 = { package = "reallyme-crypto-ml-kem-512", version = "0.1.1", path = "../primitives/ml-kem-512", default-features = false, features = ["native"] }
crypto-ml-kem-768 = { package = "reallyme-crypto-ml-kem-768", version = "0.1.2", path = "../primitives/ml-kem-768", default-features = false, features = ["native"] }
crypto-rsa = { package = "reallyme-crypto-rsa", version = "0.1.1", path = "../primitives/rsa", default-features = false, features = ["wasm"] }
crypto-slh-dsa = { package = "reallyme-crypto-slh-dsa", version = "0.1.1", path = "../primitives/slh-dsa", default-features = false, features = ["native"] }
crypto-x-wing = { package = "reallyme-crypto-x-wing", version = "0.1.1", path = "../primitives/x-wing", default-features = false, features = ["wasm"] }
codec-base64url = { package = "reallyme-codec-base64url", version = "0.1.1", path = "../../codec/base64url" }
codec-cbor = { package = "reallyme-codec-cbor", version = "0.1.1", path = "../../codec/cbor" }
codec-multibase = { package = "reallyme-codec-multibase", version = "0.1.1", path = "../../codec/multibase" }
codec-multicodec = { package = "reallyme-codec-multicodec", version = "0.1.1", path = "../../codec/multicodec" }
codec-multikey = { package = "reallyme-codec-multikey", version = "0.1.1", path = "../../codec/multikey" }
js-sys = { workspace = true }
wasm-bindgen = { workspace = true }
zeroize = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# Enables the wasm JS entropy backend for transitive RustCrypto dependencies
# that still use getrandom 0.2 through rand_core 0.6.
getrandom02 = { package = "getrandom", version = "0.2.17", features = ["js"] }

[lints]
workspace = true
