[package]
name = "reallyme-crypto-dispatch"
version = "0.3.2"
include = ["/src/**/*.rs", "/Cargo.toml", "/README.md", "/LICENSE", "/NOTICE"]
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "Algorithm dispatch, codec binding, and structural validation for cryptographic primitives."

[lib]
name = "crypto_dispatch"

[features]
default = []

native = [
    "crypto-ed25519?/native",
    "crypto-p256?/native",
    "crypto-p384?/native",
    "crypto-p521?/native",
    "crypto-secp256k1?/native",
    "crypto-x25519?/native",
    "crypto-ml-dsa-44?/native",
    "crypto-ml-dsa-65?/native",
    "crypto-ml-dsa-87?/native",
    "crypto-ml-kem-512?/native",
    "crypto-ml-kem-768?/native",
    "crypto-ml-kem-1024?/native",
    "crypto-x-wing?/native",
]

wasm = [
    "crypto-ed25519?/wasm",
    "crypto-p256?/wasm",
    "crypto-p384?/wasm",
    "crypto-p521?/wasm",
    "crypto-secp256k1?/wasm",
    "crypto-x25519?/wasm",
    "crypto-ml-dsa-44?/wasm",
    "crypto-ml-dsa-65?/wasm",
    "crypto-ml-dsa-87?/wasm",
    "crypto-ml-kem-512?/wasm",
    "crypto-ml-kem-768?/wasm",
    "crypto-ml-kem-1024?/wasm",
    "crypto-x-wing?/wasm",
]

ed25519 = ["dep:crypto-ed25519"]
ml-dsa-44 = ["dep:crypto-ml-dsa-44"]
ml-dsa-65 = ["dep:crypto-ml-dsa-65"]
ml-dsa-87 = ["dep:crypto-ml-dsa-87"]
ml-kem-512 = ["dep:crypto-ml-kem-512"]
ml-kem-768 = ["dep:crypto-ml-kem-768"]
ml-kem-1024 = ["dep:crypto-ml-kem-1024"]
p256 = ["dep:crypto-p256"]
p384 = ["dep:crypto-p384"]
p521 = ["dep:crypto-p521"]
secp256k1 = ["dep:crypto-secp256k1"]
x25519 = ["dep:crypto-x25519"]
x-wing = ["dep:crypto-x-wing"]

[dependencies]
thiserror = { workspace = true }

# --- Core definitions (no behavior) ---
crypto-core = { package = "reallyme-crypto-core", version = "=0.3.2", path = "../core" }

# --- Codec bindings ---
codec-multikey = { package = "reallyme-codec-multikey", version = "0.2.0" }

# --- Algorithm primitives (ALL mandatory, gated by features) ---
crypto-ed25519 = { package = "reallyme-crypto-ed25519", version = "=0.3.2", path = "../../ed25519", optional = true, default-features = false }
crypto-p256 = { package = "reallyme-crypto-p256", version = "=0.3.2", path = "../../p256", optional = true, default-features = false }
crypto-p384 = { package = "reallyme-crypto-p384", version = "=0.3.2", path = "../../p384", optional = true, default-features = false }
crypto-p521 = { package = "reallyme-crypto-p521", version = "=0.3.2", path = "../../p521", optional = true, default-features = false }
crypto-secp256k1 = { package = "reallyme-crypto-secp256k1", version = "=0.3.2", path = "../../secp256k1", optional = true, default-features = false }
crypto-x25519 = { package = "reallyme-crypto-x25519", version = "=0.3.2", path = "../../x25519", optional = true, default-features = false }
crypto-ml-dsa-44 = { package = "reallyme-crypto-ml-dsa-44", version = "=0.3.2", path = "../../ml-dsa-44", optional = true, default-features = false }
crypto-ml-dsa-65 = { package = "reallyme-crypto-ml-dsa-65", version = "=0.3.2", path = "../../ml-dsa-65", optional = true, default-features = false }
crypto-ml-dsa-87 = { package = "reallyme-crypto-ml-dsa-87", version = "=0.3.2", path = "../../ml-dsa-87", optional = true, default-features = false }
crypto-ml-kem-512 = { package = "reallyme-crypto-ml-kem-512", version = "=0.3.2", path = "../../ml-kem-512", optional = true, default-features = false }
crypto-ml-kem-768 = { package = "reallyme-crypto-ml-kem-768", version = "=0.3.2", path = "../../ml-kem-768", optional = true, default-features = false }
crypto-ml-kem-1024 = { package = "reallyme-crypto-ml-kem-1024", version = "=0.3.2", path = "../../ml-kem-1024", optional = true, default-features = false }
crypto-x-wing = { package = "reallyme-crypto-x-wing", version = "=0.3.2", path = "../../x-wing", optional = true, default-features = false }
zeroize = { workspace = true }

[dev-dependencies]
hex = { workspace = true }
wasm-bindgen-test = { workspace = true }

[lints]
workspace = true
