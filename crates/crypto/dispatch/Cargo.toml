[package]
name = "reallyme-crypto-dispatch"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "Algorithm dispatch, codec binding, and structural validation for cryptographic primitives."

[lib]
name = "crypto_dispatch"

[features]
default = []

native = [
    "crypto-ed25519/native",
    "crypto-hmac/native",
    "crypto-p256/native",
    "crypto-p384/native",
    "crypto-p521/native",
    "crypto-secp256k1/native",
    "crypto-x25519/native",
    "crypto-ml-dsa-44/native",
    "crypto-ml-dsa-65/native",
    "crypto-ml-dsa-87/native",
    "crypto-ml-kem-512/native",
    "crypto-ml-kem-768/native",
    "crypto-ml-kem-1024/native",
    "crypto-aes256-gcm/native",
    "crypto-aes256-gcm-siv/native",
    "crypto-chacha20-poly1305/native",
    "crypto-sha2/native",
    "crypto-sha2-256/native",
    "crypto-sha3/native",
    "crypto-sha3-256/native",
    "crypto-x-wing/native",
]

wasm = [
    "crypto-ed25519/wasm",
    "crypto-hmac/wasm",
    "crypto-p256/wasm",
    "crypto-p384/wasm",
    "crypto-p521/wasm",
    "crypto-secp256k1/wasm",
    "crypto-x25519/wasm",
    "crypto-ml-dsa-44/wasm",
    "crypto-ml-dsa-65/wasm",
    "crypto-ml-dsa-87/wasm",
    "crypto-ml-kem-512/wasm",
    "crypto-ml-kem-768/wasm",
    "crypto-ml-kem-1024/wasm",
    "crypto-aes256-gcm/wasm",
    "crypto-aes256-gcm-siv/wasm",
    "crypto-chacha20-poly1305/wasm",
    "crypto-sha2/wasm",
    "crypto-sha2-256/wasm",
    "crypto-sha3/wasm",
    "crypto-sha3-256/wasm",
    "crypto-x-wing/wasm",
]

[dependencies]
thiserror = { workspace = true }

# --- Core definitions (no behavior) ---
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../core" }

# --- Codec bindings ---
codec-multikey = { package = "reallyme-codec-multikey", version = "0.1.1", path = "../../codec/multikey" }

# --- Algorithm primitives (ALL mandatory, gated by features) ---
crypto-ed25519 = { package = "reallyme-crypto-ed25519", version = "0.1.1", path = "../primitives/ed25519", default-features = false }
crypto-hmac = { package = "reallyme-crypto-hmac", version = "0.1.1", path = "../primitives/hmac", default-features = false }
crypto-p256 = { package = "reallyme-crypto-p256", version = "0.1.1", path = "../primitives/p256", default-features = false }
crypto-p384 = { package = "reallyme-crypto-p384", version = "0.1.1", path = "../primitives/p384", default-features = false }
crypto-p521 = { package = "reallyme-crypto-p521", version = "0.1.1", path = "../primitives/p521", default-features = false }
crypto-secp256k1 = { package = "reallyme-crypto-secp256k1", version = "0.1.1", path = "../primitives/secp256k1", default-features = false }
crypto-x25519 = { package = "reallyme-crypto-x25519", version = "0.1.1", path = "../primitives/x25519", default-features = false }
crypto-ml-dsa-44 = { package = "reallyme-crypto-ml-dsa-44", version = "0.1.1", path = "../primitives/ml-dsa-44", default-features = false }
crypto-ml-dsa-65 = { package = "reallyme-crypto-ml-dsa-65", version = "0.1.1", path = "../primitives/ml-dsa-65", default-features = false }
crypto-ml-dsa-87 = { package = "reallyme-crypto-ml-dsa-87", version = "0.1.1", path = "../primitives/ml-dsa-87", default-features = false }
crypto-ml-kem-512 = { package = "reallyme-crypto-ml-kem-512", version = "0.1.1", path = "../primitives/ml-kem-512", default-features = false }
crypto-ml-kem-768 = { package = "reallyme-crypto-ml-kem-768", version = "0.1.1", path = "../primitives/ml-kem-768", default-features = false }
crypto-ml-kem-1024 = { package = "reallyme-crypto-ml-kem-1024", version = "0.1.1", path = "../primitives/ml-kem-1024", default-features = false }
crypto-aes256-gcm = { package = "reallyme-crypto-aes256-gcm", version = "0.1.1", path = "../primitives/aes256-gcm", default-features = false }
crypto-aes256-gcm-siv = { package = "reallyme-crypto-aes256-gcm-siv", version = "0.1.1", path = "../primitives/aes256-gcm-siv", default-features = false }
crypto-chacha20-poly1305 = { package = "reallyme-crypto-chacha20-poly1305", version = "0.1.1", path = "../primitives/chacha20-poly1305", default-features = false }
crypto-sha2 = { package = "reallyme-crypto-sha2", version = "0.1.1", path = "../primitives/sha2", default-features = false }
crypto-sha2-256 = { package = "reallyme-crypto-sha2-256", version = "0.1.1", path = "../primitives/sha2-256", default-features = false }
crypto-sha3 = { package = "reallyme-crypto-sha3", version = "0.1.1", path = "../primitives/sha3", default-features = false }
crypto-sha3-256 = { package = "reallyme-crypto-sha3-256", version = "0.1.1", path = "../primitives/sha3-256", default-features = false }
crypto-x-wing = { package = "reallyme-crypto-x-wing", version = "0.1.1", path = "../primitives/x-wing", default-features = false }
zeroize = { workspace = true }

[dev-dependencies]
hex = { workspace = true }
wasm-bindgen-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
aes-gcm = { workspace = true }

[lints]
workspace = true
