[package]
name = "reallyme-crypto-x448"
version = "0.3.2"
include = ["/src/**/*.rs", "/Cargo.toml", "/README.md", "/LICENSE", "/NOTICE"]
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "X448 key agreement primitive for ReallyMe Crypto."

[lib]
name = "crypto_x448"

[features]
default = []
native = ["dep:getrandom", "dep:x448"]
wasm = ["native"]

[dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "=0.3.2", path = "../crypto/core" }
getrandom = { workspace = true, optional = true, features = ["wasm_js"] }
x448 = { workspace = true, features = ["static_secrets"], optional = true }
zeroize = { workspace = true }

[dev-dependencies]
hex = { workspace = true }

[lints]
workspace = true
