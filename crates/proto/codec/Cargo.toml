[package]
name = "reallyme-codec-proto"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "ReallyMe codec protobuf error envelopes generated with Buffa."
include = ["/src/**/*.rs", "/Cargo.toml", "/README.md", "/LICENSE", "/NOTICE"]

[features]
default = []
generated = ["dep:buffa", "dep:serde"]

[dependencies]
buffa = { workspace = true, optional = true }
serde = { workspace = true, optional = true }

[lints]
workspace = true
