[package]
name = "reallyme-crypto-proto"
version = "0.1.3"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "ReallyMe crypto protobuf identifiers generated with Buffa."
include = ["/src/**/*.rs", "/Cargo.toml", "/README.md", "/LICENSE", "/NOTICE"]

[features]
default = []
generated = ["dep:buffa", "dep:serde", "dep:crypto-core", "dep:thiserror"]

[dependencies]
buffa = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
# Enables the `convert` bridge between the generated protobuf algorithm
# identifiers and the internal `crypto_core` enums.
crypto-core = { package = "reallyme-crypto-core", version = "0.1.2", path = "../../crypto/core", optional = true }
thiserror = { workspace = true, optional = true }

[lints]
workspace = true
