[package]
name = "reallyme-crypto-proto"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "ReallyMe crypto protobuf identifiers generated with Buffa."
include = ["/proto/**/*.proto", "/src/**/*.rs", "/Cargo.toml", "/README.md", "/LICENSE", "/NOTICE"]

[features]
default = []
generated = ["dep:buffa", "dep:crypto-core", "dep:serde", "dep:serde_json", "dep:thiserror", "dep:zeroize"]

[dependencies]
buffa = { workspace = true, optional = true }
# Enables the `convert` bridge between the generated protobuf algorithm
# identifiers and the internal `crypto_core` enums.
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../crypto/core", optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
zeroize = { workspace = true, optional = true }

[lints]
workspace = true
