[package]
name = "reallyme-crypto-jwk-multikey"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
description = "JWK and Multikey public-key envelope conversion for ReallyMe Crypto."

[lib]
name = "envelopes_jwk_multikey"

[features]
default = []

native = ["crypto-p256/native", "crypto-secp256k1/native"]

wasm = ["crypto-p256/wasm", "crypto-secp256k1/wasm"]

[dependencies]
thiserror.workspace = true

# multikey codec (decode / encode)
codec-multikey = { package = "reallyme-codec-multikey", version = "0.1.1", path = "../../codec/multikey" }

# JWK envelope
envelopes-jwk = { package = "reallyme-crypto-jwk", version = "0.1.1", path = "../jwk" }

# base64url
codec-base64url = { package = "reallyme-codec-base64url", version = "0.1.1", path = "../../codec/base64url" }
crypto-p256 = { package = "reallyme-crypto-p256", version = "0.1.1", path = "../../crypto/primitives/p256", default-features = false }
crypto-secp256k1 = { package = "reallyme-crypto-secp256k1", version = "0.1.1", path = "../../crypto/primitives/secp256k1", default-features = false }

[dev-dependencies]
crypto-core = { package = "reallyme-crypto-core", version = "0.1.1", path = "../../crypto/core" }
crypto-dispatch = { package = "reallyme-crypto-dispatch", version = "0.1.1", path = "../../crypto/dispatch", default-features = false, features = ["native"] }

[lints]
workspace = true
