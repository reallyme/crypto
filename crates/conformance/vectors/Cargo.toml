[package]
name = "crypto-conformance-vectors"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[package.metadata.cargo-machete]
ignored = [
  # Enables getrandom's wasm entropy backend for independent oracle crates.
  "getrandom",
]

[[bin]]
name = "gen_vectors"
path = "src/bin/gen_vectors.rs"
required-features = ["native"]

[features]
default = ["native"]

# Platform feature packs
native = [
  "envelopes-jwk/native",
  "envelopes-jwk-multikey/native",
  "crypto-aes-kw/native",
  "crypto-aes256-gcm/native",
  "crypto-aes256-gcm-siv/native",
  "crypto-argon2id/native",
  "crypto-chacha20-poly1305/native",
  "crypto-concat-kdf/native",
  "crypto-hkdf/native",
  "crypto-hkdf/sha3",
  "crypto-hmac/native",
  "crypto-hpke/test-vectors",
  "crypto-sha2/native",
  "crypto-sha3/native",
  "crypto-p256/native",
  "crypto-p384/native",
  "crypto-p521/native",
  "crypto-pbkdf2/native",
  "crypto-rsa/native",
  "crypto-ed25519/native",
  "crypto-secp256k1/native",
  "crypto-x25519/native",
  "crypto-ml-dsa-44/native",
  "crypto-ml-dsa-65/native",
  "crypto-ml-dsa-87/native",
  "crypto-ml-kem-512/native",
  "crypto-ml-kem-768/native",
  "crypto-ml-kem-1024/native",
  "crypto-slh-dsa/native",
  "crypto-x-wing/native",
]

wasm = [
  "dep:getrandom",
  "crypto-aes-kw/wasm",
  "crypto-aes256-gcm/wasm",
  "crypto-aes256-gcm-siv/wasm",
  "crypto-argon2id/wasm",
  "crypto-chacha20-poly1305/wasm",
  "crypto-concat-kdf/wasm",
  "crypto-hkdf/wasm",
  "crypto-hkdf/sha3",
  "crypto-hmac/wasm",
  "crypto-hpke/wasm",
  "crypto-sha2/wasm",
  "crypto-sha3/wasm",
  "crypto-p256/wasm",
  "crypto-p384/wasm",
  "crypto-p521/wasm",
  "crypto-pbkdf2/wasm",
  "crypto-rsa/wasm",
  "crypto-ed25519/wasm",
  "crypto-secp256k1/wasm",
  "crypto-x25519/wasm",
  "crypto-ml-dsa-44/wasm",
  "crypto-ml-dsa-65/wasm",
  "crypto-ml-dsa-87/wasm",
  "crypto-ml-kem-512/wasm",
  "crypto-ml-kem-768/wasm",
  "crypto-ml-kem-1024/wasm",
  "crypto-slh-dsa/wasm",
  "crypto-x-wing/wasm",
]

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }
getrandom = { version = "0.4", features = ["wasm_js"], optional = true }

ed25519-dalek-conformance = { package = "ed25519-dalek", version = "3.0" }
k256-conformance = { package = "k256", version = "0.14", features = ["ecdsa"] }
ml-dsa-conformance = { package = "ml-dsa", version = "0.1.1" }
ml-kem-conformance = { package = "ml-kem", version = "0.3.2", features = ["zeroize"] }
p256-conformance = { package = "p256", version = "0.14", features = ["ecdh", "ecdsa"] }
p384-conformance = { package = "p384", version = "0.14", features = ["ecdsa"] }
p521-conformance = { package = "p521", version = "0.14", features = ["ecdsa"] }
x25519-dalek-conformance = { package = "x25519-dalek", version = "3", features = ["static_secrets"] }

crypto-aes-kw = { package = "reallyme-crypto-aes-kw", version = "0.2.0", path = "../../crypto/primitives/aes-kw", default-features = false }
crypto-aes256-gcm = { package = "reallyme-crypto-aes256-gcm", version = "0.2.0", path = "../../crypto/primitives/aes256-gcm", default-features = false }
crypto-aes256-gcm-siv = { package = "reallyme-crypto-aes256-gcm-siv", version = "0.2.0", path = "../../crypto/primitives/aes256-gcm-siv", default-features = false }
crypto-argon2id = { package = "reallyme-crypto-argon2id", version = "0.2.0", path = "../../crypto/primitives/argon2id", default-features = false }
crypto-chacha20-poly1305 = { package = "reallyme-crypto-chacha20-poly1305", version = "0.2.0", path = "../../crypto/primitives/chacha20-poly1305", default-features = false }
crypto-concat-kdf = { package = "reallyme-crypto-concat-kdf", version = "0.2.0", path = "../../crypto/primitives/concat-kdf", default-features = false }
crypto-core = { package = "reallyme-crypto-core", version = "0.2.0", path = "../../crypto/core" }
crypto-hkdf = { package = "reallyme-crypto-hkdf", version = "0.2.0", path = "../../crypto/primitives/hkdf", default-features = false }
crypto-hmac = { package = "reallyme-crypto-hmac", version = "0.2.0", path = "../../crypto/primitives/hmac", default-features = false }
crypto-hpke = { package = "reallyme-crypto-hpke", version = "0.2.0", path = "../../crypto/protocols/hpke", default-features = false }
crypto-sha2 = { package = "reallyme-crypto-sha2", version = "0.2.0", path = "../../crypto/primitives/sha2", default-features = false }
crypto-sha3 = { package = "reallyme-crypto-sha3", version = "0.2.0", path = "../../crypto/primitives/sha3", default-features = false }
crypto-p256 = { package = "reallyme-crypto-p256", version = "0.2.0", path = "../../crypto/primitives/p256", default-features = false }
crypto-p384 = { package = "reallyme-crypto-p384", version = "0.2.0", path = "../../crypto/primitives/p384", default-features = false }
crypto-p521 = { package = "reallyme-crypto-p521", version = "0.2.0", path = "../../crypto/primitives/p521", default-features = false }
crypto-pbkdf2 = { package = "reallyme-crypto-pbkdf2", version = "0.2.0", path = "../../crypto/primitives/pbkdf2", default-features = false }
crypto-rsa = { package = "reallyme-crypto-rsa", version = "0.2.0", path = "../../crypto/primitives/rsa", default-features = false }
crypto-ed25519 = { package = "reallyme-crypto-ed25519", version = "0.2.0", path = "../../crypto/primitives/ed25519", default-features = false }
crypto-secp256k1 = { package = "reallyme-crypto-secp256k1", version = "0.2.0", path = "../../crypto/primitives/secp256k1", default-features = false }
crypto-x25519 = { package = "reallyme-crypto-x25519", version = "0.2.0", path = "../../crypto/primitives/x25519", default-features = false }
crypto-x-wing = { package = "reallyme-crypto-x-wing", version = "0.2.0", path = "../../crypto/primitives/x-wing", default-features = false }
crypto-ml-dsa-44 = { package = "reallyme-crypto-ml-dsa-44", version = "0.2.0", path = "../../crypto/primitives/ml-dsa-44", default-features = false }
crypto-ml-dsa-65 = { package = "reallyme-crypto-ml-dsa-65", version = "0.2.0", path = "../../crypto/primitives/ml-dsa-65", default-features = false }
crypto-ml-dsa-87 = { package = "reallyme-crypto-ml-dsa-87", version = "0.2.0", path = "../../crypto/primitives/ml-dsa-87", default-features = false }
crypto-ml-kem-512 = { package = "reallyme-crypto-ml-kem-512", version = "0.2.0", path = "../../crypto/primitives/ml-kem-512", default-features = false }
crypto-ml-kem-768 = { package = "reallyme-crypto-ml-kem-768", version = "0.2.0", path = "../../crypto/primitives/ml-kem-768", default-features = false }
crypto-ml-kem-1024 = { package = "reallyme-crypto-ml-kem-1024", version = "0.2.0", path = "../../crypto/primitives/ml-kem-1024", default-features = false }
crypto-slh-dsa = { package = "reallyme-crypto-slh-dsa", version = "0.2.0", path = "../../crypto/primitives/slh-dsa", default-features = false }
crypto-sha2-256 = { package = "reallyme-crypto-sha2-256", version = "0.2.0", path = "../../crypto/primitives/sha2-256" }
crypto-sha3-256 = { package = "reallyme-crypto-sha3-256", version = "0.2.0", path = "../../crypto/primitives/sha3-256" }
envelopes-jwk = { package = "reallyme-crypto-jwk", version = "0.2.0", path = "../../envelopes/jwk", default-features = false }
envelopes-jwk-multikey = { package = "reallyme-crypto-jwk-multikey", version = "0.2.0", path = "../../envelopes/jwk-multikey", default-features = false }
zeroize = { workspace = true }

[lints]
workspace = true
